services:
  db:
    image: postgres:16-alpine
    container_name: fantasy_draft_db
    environment:
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy_dev_password
      POSTGRES_DB: fantasy_draft
    ports:
      # 5433 on the host — a local PostgreSQL service already occupies 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantasy -d fantasy_draft"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
